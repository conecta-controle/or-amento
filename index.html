<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ---------------------------------------------------------------
   Tokens
----------------------------------------------------------------*/
const INK = "var(--ink)";
const BG = "var(--bg)";
const SURFACE = "var(--surface)";
const GREEN = "var(--green)";
const NAVY = "var(--navy)";
const BRICK = "var(--brick)";
const GOLD = "var(--gold)";
const LINE = "var(--line)";
const PALETTE = [GOLD, NAVY, "#5C8A76", BRICK, "#7C6FA8", "#4C7A96", "#C97B3D", "#8A9A5B"];
const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DEFAULT_CATEGORIES = ["Moradia","Contas","Carro","Saúde","Exercício","Viagens","Reserva de Emergência"];

function fmtBRL(v) {
  const n = Number(v) || 0;
  return n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}
function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; }
function monthLabel(key) {
  const [y, m] = key.split("-").map(Number);
  return `${MESES[m - 1]} de ${y}`;
}
function shiftMonth(key, delta) {
  const [y, m] = key.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return monthKey(d);
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function emptyMonthData() {
  return { salario: 0, extras: [], fixas: [], variaveis: [], categorias: [...DEFAULT_CATEGORIES] };
}
function receitaTotal(d) { return (d.salario || 0) + (d.extras || []).reduce((s, r) => s + r.valor, 0); }
function despesasTotal(d) { return (d.fixas || []).reduce((s, r) => s + r.valor, 0) + (d.variaveis || []).reduce((s, r) => s + r.valor, 0); }

/* ---------------------------------------------------------------
   Theme
----------------------------------------------------------------*/
function getStoredTheme() {
  const saved = localStorage.getItem("theme");
  if (saved === "light" || saved === "dark") return saved;
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}
function applyTheme(mode) {
  document.documentElement.setAttribute("data-theme", mode);
  localStorage.setItem("theme", mode);
}
function ThemeToggle({ theme, onToggle }) {
  return (
    <button onClick={onToggle} className="p-2 rounded-lg border shrink-0" style={{ borderColor: LINE, background: SURFACE }} aria-label="Alternar tema claro/escuro">
      {theme === "dark" ? <I.Sun className="w-4 h-4" style={{ color: GOLD }} /> : <I.Moon className="w-4 h-4" style={{ color: "var(--muted-1)" }} />}
    </button>

}

const I = {

  Users: (p) => <Icon {...p} path='<circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-5 7-5s7 1.7 7 5"/><circle cx="17" cy="8" r="2.6"/><path d="M16 4.2c1.2.3 2 1.4 2 2.8s-.8 2.5-2 2.8"/><path d="M18 15.3c2.3.4 4 1.7 4 4.7"/>' />,

/* ---------------------------------------------------------------
   Firestore helpers
----------------------------------------------------------------*/
function fb() { return window.__firebase; }
const RESERVED_MONTH_KEYS = new Set(["_investimentos", "_profile", "_meta"]);
// Legacy docs stored a flat `receita` number; new docs split it into salario + extras.
function migrateMonth(raw) {
  if (!raw) return raw;
  if (raw.salario === undefined && typeof raw.receita === "number") {
    return { ...raw, salario: raw.receita, extras: raw.extras || [] };
  }
  return raw;
}
async function loadMonth(uidStr, key) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", key);
  const snap = await f.getDoc(ref);
  return snap.exists ? migrateMonth(snap.data()) : null;
}
async function saveMonth(uidStr, key, data) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", key);
  await f.setDoc(ref, data, { merge: false });
}
async function loadAllMonths(uidStr) {
  const f = fb();
  const colRef = f.collection(f.db, "users", uidStr, "months");
  const snap = await f.getDocs(colRef);
  const out = [];
  // "_investimentos"/"_profile"/"_meta" are reserved keys in this same collection — not real months.
  snap.forEach((d) => { if (!RESERVED_MONTH_KEYS.has(d.id)) out.push(migrateMonth(d.data())); });
  return out;
}
async function loadInvestimentos(uidStr) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", "_investimentos");
  const snap = await f.getDoc(ref);
  return snap.exists ? (snap.data().aportes || []) : [];
}
async function saveInvestimentos(uidStr, aportes) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", "_investimentos");
  await f.setDoc(ref, { aportes }, { merge: false });
}
// Lightweight profile doc (email + signup date) written by each user for the admin account list.
async function saveProfile(uidStr, email) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", "_profile");
  await f.setDoc(ref, { email, createdAt: new Date().toISOString() }, { merge: false });
}
// Accounts created before the profile doc existed get backfilled on their next login.
async function ensureProfile(uidStr, email) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", "_profile");
  const snap = await f.getDoc(ref);
  if (!snap.exists) await f.setDoc(ref, { email, createdAt: new Date().toISOString() }, { merge: false });
}
async function loadAllProfiles() {
  const f = fb();
  const snap = await f.getDocs(f.collectionGroup(f.db, "months"));
  const out = [];
  snap.forEach((d) => { if (d.id === "_profile") out.push(d.data()); });
  return out;
}
async function loadMeta(uidStr) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", "_meta");
  const snap = await f.getDoc(ref);
  return snap.exists ? (snap.data().valor || 0) : 0;
}
async function saveMeta(uidStr, valor) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", "_meta");
  await f.setDoc(ref, { valor }, { merge: false });
}

/* ---------------------------------------------------------------
   Small UI atoms

  return <span className={`font-mono-app tabular-nums whitespace-nowrap ${className}`} style={color ? { color } : undefined}>{fmtBRL(value)}</span>;
}
function IconField({ icon: IconComp, ...props }) {
  return (
    <div className="relative">
      <IconComp className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style={{ color: "var(--muted-2)" }} />

}

/* ---------------------------------------------------------------
   Auth screen
----------------------------------------------------------------*/
function AuthScreen({ theme, onToggleTheme }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError("");
    if (!email.trim() || !password) { setError("Preencha e-mail e senha."); return; }
    setBusy(true);
    const f = fb();
    try {
      if (mode === "register") {
        const cred = await f.createUserWithEmailAndPassword(f.auth, email.trim(), password);
        await saveProfile(cred.user.uid, email.trim());
      } else {
        await f.signInWithEmailAndPassword(f.auth, email.trim(), password);
      }
    } catch (err) {
      const map = {
        "auth/email-already-in-use": "Esse e-mail já está cadastrado. Tente entrar.",
        "auth/invalid-email": "E-mail inválido.",
        "auth/weak-password": "A senha precisa ter pelo menos 6 caracteres.",
        "auth/user-not-found": "Usuário não encontrado. Cadastre-se.",
        "auth/wrong-password": "Senha incorreta.",
        "auth/invalid-credential": "E-mail ou senha incorretos.",
      };
      setError(map[err.code] || "Não foi possível continuar. Tente novamente.");
    }
    setBusy(false);
  }

  return (
    <div className="min-h-screen w-full flex items-center justify-center px-4 relative" style={{ background: BG }}>
      <div className="absolute top-4 right-4"><ThemeToggle theme={theme} onToggle={onToggleTheme} /></div>
      <div className="w-full max-w-sm">
        <div className="flex flex-col items-center mb-6">
          <div className="w-12 h-12 rounded-xl flex items-center justify-center mb-3" style={{ background: GREEN }}>
            <I.Landmark className="w-6 h-6 text-white" />
          </div>
          <h1 className="text-2xl font-serif-app" style={{ color: INK }}>Meu Orçamento</h1>
          <p className="text-sm mt-1" style={{ color: "var(--muted-3)" }}>Cada pessoa tem sua própria planilha</p>
        </div>
        <div className="rounded-2xl p-6" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
          <div className="flex mb-5 rounded-lg p-1" style={{ background: BG }}>
            {["login", "register"].map((m) => (
              <button key={m} onClick={() => { setMode(m); setError(""); }}
                className="flex-1 py-2 text-sm rounded-md font-medium transition"
                style={mode === m ? { background: SURFACE, color: INK, boxShadow: "0 1px 2px rgba(0,0,0,0.06)" } : { color: "var(--muted-1)" }}>
                {m === "login" ? "Entrar" : "Cadastrar"}
              </button>
            ))}
          </div>
          <form onSubmit={submit} className="space-y-3">
            <IconField icon={I.User} placeholder="E-mail" type="email" value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="username" />
            <div className="relative">
              <IconField icon={I.Lock} placeholder="Senha" type={showPw ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} autoComplete={mode === "login" ? "current-password" : "new-password"} />
              <button type="button" onClick={() => setShowPw((s) => !s)} className="absolute right-3 top-1/2 -translate-y-1/2" style={{ color: "var(--muted-2)" }}>
                {showPw ? <I.EyeOff className="w-4 h-4" /> : <I.Eye className="w-4 h-4" />}
              </button>
            </div>
            {error && <p className="text-xs" style={{ color: BRICK }}>{error}</p>}
            <button type="submit" disabled={busy}
              className="w-full py-2.5 rounded-lg text-sm font-medium text-white flex items-center justify-center gap-2 transition disabled:opacity-60" style={{ background: GREEN }}>
              {busy && <I.Spinner className="w-4 h-4 animate-spin" />}
              {mode === "login" ? "Entrar" : "Criar minha conta"}
            </button>
          </form>
        </div>
        <p className="text-[11px] text-center mt-4" style={{ color: "var(--muted-2)" }}>Seus dados ficam salvos com segurança, vinculados ao seu login.</p>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   Donut chart (pure SVG, no external chart library)
----------------------------------------------------------------*/
function Donut({ items }) {
  const data = items.filter((i) => i.value > 0);
  const total = data.reduce((s, i) => s + i.value, 0);
  if (data.length === 0) {
    return <div className="h-52 flex items-center justify-center text-sm" style={{ color: "var(--muted-4)" }}>Sem lançamentos ainda</div>;
  }
  const R = 70, C = 2 * Math.PI * R;
  let offset = 0;
  return (
    <div className="h-52 flex items-center justify-center">
      <svg viewBox="0 0 180 180" className="w-44 h-44 -rotate-90">
        <circle cx="90" cy="90" r={R} fill="none" stroke={BG} strokeWidth="24" />
        {data.map((d, i) => {
          const frac = d.value / total;
          const dash = frac * C;
          const el = (
            <circle key={i} cx="90" cy="90" r={R} fill="none" stroke={d.color} strokeWidth="24"
              strokeDasharray={`${dash} ${C - dash}`} strokeDashoffset={-offset} />
          );
          offset += dash;
          return el;
        })}
      </svg>
    </div>
  );
}
function Legend({ items }) {
  const total = items.reduce((s, i) => s + i.value, 0) || 1;
  return (
    <div className="flex flex-wrap gap-x-4 gap-y-1.5 mt-2">
      {items.filter((i) => i.value > 0).map((i, idx) => (
        <div key={idx} className="flex items-center gap-1.5 text-xs" style={{ color: "var(--muted-3)" }}>
          <span className="w-2 h-2 rounded-full" style={{ background: i.color }} />
          <span>{Math.round((i.value / total) * 100)}% {i.name}</span>
        </div>
      ))}
    </div>
  );
}

/* ---------------------------------------------------------------

function SummaryCard({ label, value, icon: IconComp, color, action }) {

/* ---------------------------------------------------------------
   Modals
----------------------------------------------------------------*/
const KIND_META = {
  fixa: { article: "Nova", noun: "despesa fixa" },
  variavel: { article: "Nova", noun: "despesa variável" },
  extra: { article: "Nova", noun: "receita extra" },
  aporte: { article: "Novo", noun: "aporte" },
};
function ExpenseModal({ kind, initial, categorias, onSave, onClose, onAddCategoria }) {
  const [nome, setNome] = useState(initial?.nome || "");
  const [valor, setValor] = useState(initial?.valor ?? "");
  const [data, setData] = useState(initial?.data || new Date().toISOString().slice(0, 10));
  const [categoria, setCategoria] = useState(initial?.categoria || "");
  const [novaCategoria, setNovaCategoria] = useState("");
  const [addingCat, setAddingCat] = useState(false);

  function submit(e) {
    e.preventDefault();
    if (!nome.trim() || !valor) return;
    onSave({ id: initial?.id || uid(), nome: nome.trim(), valor: Number(valor), data, ...(kind === "variavel" ? { categoria: categoria || "Outros" } : {}) });
  }
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{ background: "var(--overlay)" }} onClick={onClose}>
      <div className="w-full max-w-sm max-h-[90vh] overflow-y-auto rounded-2xl p-5" style={{ background: SURFACE }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-serif-app text-lg" style={{ color: INK }}>{initial ? "Editar" : KIND_META[kind].article} {KIND_META[kind].noun}</h3>
          <button onClick={onClose}><I.X className="w-4 h-4" style={{ color: "var(--muted-2)" }} /></button>
        </div>
        <form onSubmit={submit} className="space-y-3">
          <div>
            <label className="text-xs font-medium" style={{ color: "var(--muted-1)" }}>Data</label>
            <input type="date" value={data} onChange={(e) => setData(e.target.value)} className="w-full mt-1 rounded-lg border px-3 py-2 text-base sm:text-sm outline-none" style={{ borderColor: LINE }} />
          </div>
          <div>
            <label className="text-xs font-medium" style={{ color: "var(--muted-1)" }}>Nome</label>
            <input value={nome} onChange={(e) => setNome(e.target.value)} placeholder="Ex: Aluguel" className="w-full mt-1 rounded-lg border px-3 py-2 text-base sm:text-sm outline-none" style={{ borderColor: LINE }} />
          </div>
          <div>
            <label className="text-xs font-medium" style={{ color: "var(--muted-1)" }}>Valor (R$)</label>
            <input type="number" step="0.01" min="0" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0,00" className="w-full mt-1 rounded-lg border px-3 py-2 text-base sm:text-sm outline-none font-mono-app" style={{ borderColor: LINE }} />
          </div>
          {kind === "variavel" && (
            <div>
              <label className="text-xs font-medium" style={{ color: "var(--muted-1)" }}>Categoria</label>
              {!addingCat ? (
                <select value={categoria} onChange={(e) => { if (e.target.value === "__new__") { setAddingCat(true); return; } setCategoria(e.target.value); }}
                  className="w-full mt-1 rounded-lg border px-3 py-2 text-base sm:text-sm outline-none" style={{ borderColor: LINE, background: SURFACE, color: INK }}>
                  <option value="">Selecione…</option>
                  {categorias.map((c) => <option key={c} value={c}>{c}</option>)}
                  <option value="__new__">+ Nova categoria</option>
                </select>
              ) : (
                <div className="flex gap-2 mt-1">
                  <input value={novaCategoria} onChange={(e) => setNovaCategoria(e.target.value)} placeholder="Nome da categoria" className="flex-1 rounded-lg border px-3 py-2 text-sm outline-none" style={{ borderColor: LINE }} />
                  <button type="button" onClick={() => { if (novaCategoria.trim()) { onAddCategoria(novaCategoria.trim()); setCategoria(novaCategoria.trim()); setNovaCategoria(""); setAddingCat(false); } }} className="px-3 rounded-lg text-sm text-white" style={{ background: GREEN }}>OK</button>
                </div>
              )}
            </div>
          )}
          <button type="submit" className="w-full py-2.5 rounded-lg text-sm font-medium text-white mt-1" style={{ background: GREEN }}>Salvar</button>
        </form>
      </div>
    </div>
  );
}
function SalarioModal({ initial, onSave, onClose }) {
  const [valor, setValor] = useState(initial || 0);
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{ background: "var(--overlay)" }} onClick={onClose}>

        <div className="flex items-center justify-between mb-4">

        <input type="number" step="0.01" min="0" value={valor} onChange={(e) => setValor(e.target.value)} className="w-full text-center text-2xl font-mono-app rounded-lg border py-2 mb-4 outline-none text-base sm:text-2xl" style={{ borderColor: LINE, color: GREEN }} />

}

/* ---------------------------------------------------------------
   Expense table
----------------------------------------------------------------*/
function ExpenseTable({ rows, kind, onEdit, onDelete, sign = -1, color = BRICK, emptyLabel = "Nenhuma despesa lançada neste mês." }) {
  if (rows.length === 0) return <div className="py-10 text-center text-sm" style={{ color: "var(--muted-4)" }}>{emptyLabel}</div>;
  const sorted = [...rows].sort((a, b) => (a.data || "").localeCompare(b.data || ""));
  const gridCols = kind === "variavel" ? "3.2rem 1fr 5rem 6rem 2.5rem" : "3.2rem 1fr 6rem 2.5rem";
  return (
    <div className="overflow-x-auto -mx-1 px-1">
      <div style={{ minWidth: kind === "variavel" ? 400 : 0 }}>
        <div className="grid text-[11px] uppercase tracking-wide font-medium pb-2 mb-1" style={{ color: "var(--muted-2)", borderBottom: `1px solid ${LINE}`, gridTemplateColumns: gridCols }}>
          <span>Data</span><span>Nome</span>{kind === "variavel" && <span>Categoria</span>}<span className="text-right">Valor</span><span />
        </div>
        {sorted.map((r) => (
          <div key={r.id} className="grid items-center py-2 text-sm" style={{ borderBottom: `1px dashed ${LINE}`, gridTemplateColumns: gridCols }}>
            <span className="text-xs" style={{ color: "var(--muted-1)" }}>{r.data ? r.data.slice(8, 10) + "/" + r.data.slice(5, 7) : ""}</span>
            <span className="truncate pr-2" style={{ color: INK }}>{r.nome}</span>
            {kind === "variavel" && <span className="text-xs px-2 py-0.5 rounded-full w-fit truncate" style={{ background: BG, color: "var(--muted-3)" }}>{r.categoria}</span>}
            <LedgerNumber value={sign * r.valor} className="text-right text-sm" color={color} />
            <div className="flex justify-end gap-2">
              <button onClick={() => onEdit(r)}><I.Pencil className="w-3.5 h-3.5" style={{ color: "var(--muted-2)" }} /></button>
              <button onClick={() => onDelete(r.id)}><I.Trash className="w-3.5 h-3.5" style={{ color: BRICK }} /></button>
            </div>
          </div>
        ))}
        <div className="flex justify-end pt-3"><LedgerNumber value={sign * rows.reduce((s, r) => s + r.valor, 0)} className="text-base font-semibold" color={color} /></div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   Orçamento page
----------------------------------------------------------------*/
function OrcamentoPage({ data, setData }) {
  const [tab, setTab] = useState("fixa");
  const [modal, setModal] = useState(null);
  const [salarioOpen, setSalarioOpen] = useState(false);

  const totalExtras = data.extras.reduce((s, r) => s + r.valor, 0);
  const receita = data.salario + totalExtras;
  const totalFixas = data.fixas.reduce((s, r) => s + r.valor, 0);
  const totalVariaveis = data.variaveis.reduce((s, r) => s + r.valor, 0);
  const despesas = totalFixas + totalVariaveis;
  const saldo = receita - despesas;

  const LIST_BY_KIND = { fixa: "fixas", variavel: "variaveis", extra: "extras" };
  function saveExpense(kind, item) {
    setData((d) => {
      const list = LIST_BY_KIND[kind];
      const arr = d[list];
      const exists = arr.some((r) => r.id === item.id);
      const next = exists ? arr.map((r) => (r.id === item.id ? item : r)) : [...arr, item];
      return { ...d, [list]: next };
    });
    setModal(null);
  }
  function deleteExpense(kind, id) {
    setData((d) => { const list = LIST_BY_KIND[kind]; return { ...d, [list]: d[list].filter((r) => r.id !== id) }; });
  }
  function addCategoria(c) { setData((d) => (d.categorias.includes(c) ? d : { ...d, categorias: [...d.categorias, c] })); }

  const fixasDonut = data.fixas.map((r, i) => ({ name: r.nome, value: r.valor, color: PALETTE[i % PALETTE.length] }));
  const variaveisByCat = useMemo(() => {
    const map = {};
    data.variaveis.forEach((r) => { map[r.categoria] = (map[r.categoria] || 0) + r.valor; });
    return Object.entries(map).map(([name, value], i) => ({ name, value, color: PALETTE[i % PALETTE.length] }));
  }, [data.variaveis]);
  const receitaDonut = [{ name: "Salário", value: data.salario, color: GREEN }, { name: "Extras", value: totalExtras, color: GOLD }];
  const donutItems = tab === "fixa" ? fixasDonut : tab === "variavel" ? variaveisByCat : receitaDonut;

  return (
    <div>
      <div className="flex flex-wrap gap-3 mb-6">
        <SummaryCard label="Receita" value={receita} icon={I.Wallet} color={GREEN} />
        <SummaryCard label="Despesas" value={despesas} icon={I.Receipt} color={BRICK} />
        <SummaryCard label="Saldo" value={saldo} icon={I.Grid} color={saldo < 0 ? BRICK : INK} />
      </div>
      <div className="grid lg:grid-cols-[1fr_320px] gap-5">
        <div className="rounded-xl p-5" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
          <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
            <div className="flex rounded-lg p-1 overflow-x-auto" style={{ background: BG }}>
              {[["receita", "Receita"], ["fixa", "Despesa fixa"], ["variavel", "Despesa variável"]].map(([k, label]) => (
                <button key={k} onClick={() => setTab(k)} className="px-3 py-1.5 text-xs sm:text-sm rounded-md font-medium transition whitespace-nowrap"
                  style={tab === k ? { background: SURFACE, color: INK, boxShadow: "0 1px 2px rgba(0,0,0,0.06)" } : { color: "var(--muted-1)" }}>{label}</button>
              ))}
            </div>
            <button onClick={() => setModal({ kind: tab === "receita" ? "extra" : tab })} className="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg text-white shrink-0" style={{ background: GREEN }}><I.Plus className="w-3.5 h-3.5" /> Adicionar</button>
          </div>
          {tab === "receita" && (
            <div className="mb-4 flex items-center justify-between gap-3 flex-wrap">
              <div>
                <p className="text-xs mb-1" style={{ color: "var(--muted-1)" }}>Salário base</p>
                <LedgerNumber value={data.salario} className="text-2xl font-semibold" color={GREEN} />
              </div>
              <button onClick={() => setSalarioOpen(true)} className="text-xs font-medium px-3 py-1.5 rounded-lg" style={{ background: BG, color: INK }}>Editar salário</button>
            </div>
          )}
          {tab === "receita" && <p className="text-xs font-medium uppercase tracking-wide mb-1" style={{ color: "var(--muted-2)" }}>Receitas extras</p>}
          {tab === "receita" && <ExpenseTable rows={data.extras} kind="extra" sign={1} color={GREEN} emptyLabel="Nenhuma receita extra lançada neste mês." onEdit={(r) => setModal({ kind: "extra", initial: r })} onDelete={(id) => deleteExpense("extra", id)} />}
          {tab === "fixa" && <ExpenseTable rows={data.fixas} kind="fixa" onEdit={(r) => setModal({ kind: "fixa", initial: r })} onDelete={(id) => deleteExpense("fixa", id)} />}
          {tab === "variavel" && <ExpenseTable rows={data.variaveis} kind="variavel" onEdit={(r) => setModal({ kind: "variavel", initial: r })} onDelete={(id) => deleteExpense("variavel", id)} />}
        </div>
        <div className="rounded-xl p-5" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
          <p className="text-xs font-medium uppercase tracking-wide mb-1" style={{ color: "var(--muted-2)" }}>{tab === "fixa" ? "Despesas fixas" : tab === "variavel" ? "Despesas variáveis" : "Salário x Extras"}</p>
          <Donut items={donutItems} /><Legend items={donutItems} />
        </div>
      </div>
      {modal && <ExpenseModal kind={modal.kind} initial={modal.initial} categorias={data.categorias} onSave={(item) => saveExpense(modal.kind, item)} onClose={() => setModal(null)} onAddCategoria={addCategoria} />}
      {salarioOpen && <SalarioModal initial={data.salario} onSave={(v) => { setData((d) => ({ ...d, salario: v })); setSalarioOpen(false); }} onClose={() => setSalarioOpen(false)} />}
    </div>
  );
}

function VisaoGeralPage({ currentData, totalInvestido, patrimonio, patrimonioLoading }) {
  const receitaMes = receitaTotal(currentData);
  const despesasMes = despesasTotal(currentData);
  const metaPct = receitaMes > 0 ? Math.min(100, Math.round((despesasMes / receitaMes) * 100)) : 0;
  const cards = [
    { label: "Patrimônio acumulado", value: patrimonio, bg: GREEN, hint: "Receitas menos despesas de todo o histórico", loading: patrimonioLoading },
    { label: "Total investido", value: totalInvestido, bg: NAVY, hint: totalInvestido > 0 ? "Seu dinheiro trabalhando" : "Comece a investir. Faça seu dinheiro render." },
    { label: "Despesas do mês", value: despesasMes, bg: BRICK, hint: `${metaPct}% da receita`, progress: metaPct },
  ];
  return (
    <div className="grid sm:grid-cols-3 gap-4">
      {cards.map((c, i) => (
        <div key={i} className="rounded-xl p-5 text-white relative overflow-hidden" style={{ background: c.bg, minHeight: 140 }}>
          <p className="text-[11px] uppercase tracking-wide opacity-80 mb-3">{c.label}</p>
          {c.loading ? <I.Spinner className="w-5 h-5 animate-spin opacity-80" /> : <LedgerNumber value={c.value} className="text-2xl font-semibold" />}
          <p className="text-xs opacity-75 mt-2">{c.hint}</p>
          {typeof c.progress === "number" && <div className="absolute bottom-0 left-0 h-1 bg-white/90" style={{ width: `${c.progress}%` }} />}
        </div>
      ))}
    </div>
  );
}

      </div>
      {valor > 0 ? (
        <>
          <div className="flex items-end justify-between mb-2 flex-wrap gap-2">
            <LedgerNumber value={totalGuardado} className="text-3xl font-semibold" color={atingida ? GREEN : INK} />

            <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, background: atingida ? GREEN : NAVY }} />

      ) : (
        <p className="text-sm text-center py-10" style={{ color: "var(--muted-4)" }}>Defina quanto você quer juntar pra acompanhar seu progresso aqui.</p>

}

----------------------------------------------------------------*/
function MonthPicker({ value, onChange, onClose }) {
  const [y] = value.split("-").map(Number);
  const [viewYear, setViewYear] = useState(y);
  return (
    <>
      <div className="fixed inset-0 z-30" onClick={onClose} />
      <div className="absolute right-0 top-full mt-2 z-40 rounded-xl p-3 w-60" style={{ background: SURFACE, border: `1px solid ${LINE}`, boxShadow: "0 8px 24px rgba(0,0,0,0.18)" }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-2">
          <button onClick={() => setViewYear((v) => v - 1)}><I.ChevLeft className="w-4 h-4" style={{ color: "var(--muted-1)" }} /></button>
          <span className="text-sm font-medium" style={{ color: INK }}>{viewYear}</span>
          <button onClick={() => setViewYear((v) => v + 1)}><I.ChevRight className="w-4 h-4" style={{ color: "var(--muted-1)" }} /></button>
        </div>
        <div className="grid grid-cols-3 gap-1.5">
          {MESES.map((mes, i) => {
            const key = `${viewYear}-${String(i + 1).padStart(2, "0")}`;
            const active = key === value;
            return (
              <button key={mes} onClick={() => { onChange(key); onClose(); }} className="text-xs py-1.5 rounded-lg font-medium transition"

                {mes.slice(0, 3)}

            );
          })}
        </div>
      </div>
    </>

}

/* ---------------------------------------------------------------
   Usuários (admin) page
----------------------------------------------------------------*/
function UsuariosPage() {
  const [state, setState] = useState({ loading: true, error: null, users: [] });
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const users = await loadAllProfiles();
        users.sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
        if (!cancelled) setState({ loading: false, error: null, users });
      } catch (err) {
        if (!cancelled) setState({ loading: false, error: err.message || "Erro ao carregar", users: [] });
      }
    })();
    return () => { cancelled = true; };
  }, []);

  return (
    <div className="rounded-xl p-5" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
      <p className="text-sm font-medium mb-4" style={{ color: INK }}>Contas cadastradas</p>
      {state.loading ? (
        <div className="flex justify-center py-10"><I.Spinner className="w-5 h-5 animate-spin" style={{ color: GREEN }} /></div>
      ) : state.error ? (
        <p className="text-sm py-6 text-center" style={{ color: BRICK }}>Não foi possível carregar a lista ({state.error}). As regras do Firestore podem ainda não permitir essa leitura.</p>
      ) : state.users.length === 0 ? (
        <p className="text-sm py-6 text-center" style={{ color: "var(--muted-4)" }}>Nenhuma conta encontrada.</p>
      ) : (
        <div>
          <div className="grid text-[11px] uppercase tracking-wide font-medium pb-2 mb-1" style={{ color: "var(--muted-2)", borderBottom: `1px solid ${LINE}`, gridTemplateColumns: "1fr 8rem" }}>
            <span>E-mail</span><span>Cadastro</span>
          </div>
          {state.users.map((u, i) => (
            <div key={i} className="grid items-center py-2 text-sm" style={{ borderBottom: `1px dashed ${LINE}`, gridTemplateColumns: "1fr 8rem" }}>
              <span className="truncate pr-2" style={{ color: INK }}>{u.email}</span>
              <span className="text-xs" style={{ color: "var(--muted-1)" }}>{u.createdAt ? u.createdAt.slice(0, 10).split("-").reverse().join("/") : "—"}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function InvestimentosPage({ investimentos, setInvestimentos }) {
  const [modal, setModal] = useState(null);

  function saveAporte(item) {
    setInvestimentos((list) => {
      const exists = list.some((r) => r.id === item.id);
      return exists ? list.map((r) => (r.id === item.id ? item : r)) : [...list, item];
    });
    setModal(null);
  }
  function deleteAporte(id) { setInvestimentos((list) => list.filter((r) => r.id !== id)); }

  return (
    <div>
      <div className="flex flex-wrap gap-3 mb-6">
        <SummaryCard label="Total investido" value={total} icon={I.Piggy} color={NAVY} />
      </div>
      <div className="rounded-xl p-5" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
        <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
          <p className="text-sm font-medium" style={{ color: INK }}>Seus aportes</p>
          <button onClick={() => setModal({ kind: "aporte" })} className="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg text-white" style={{ background: NAVY }}><I.Plus className="w-3.5 h-3.5" /> Adicionar aporte</button>
        </div>
        <ExpenseTable rows={investimentos} kind="aporte" sign={1} color={NAVY} emptyLabel="Nenhum aporte lançado ainda." onEdit={(r) => setModal({ kind: "aporte", initial: r })} onDelete={deleteAporte} />
      </div>
      {modal && <ExpenseModal kind="aporte" initial={modal.initial} categorias={[]} onAddCategoria={() => {}} onSave={saveAporte} onClose={() => setModal(null)} />}
    </div>
  );
}

/* ---------------------------------------------------------------
   App shell
----------------------------------------------------------------*/
const PAGE_TITLES = { orcamento: "Orçamento", investimentos: "Investimentos", meta: "Meta", visaogeral: "Visão geral", usuarios: "Usuários" };
const ADMIN_EMAIL = "yan@gmail.com";
function MainApp({ user, theme, onToggleTheme }) {
  const [page, setPage] = useState("orcamento");
  const [mKey, setMKey] = useState(monthKey(new Date()));
  const [data, setData] = useState(emptyMonthData());
  const [loading, setLoading] = useState(true);
  const saveTimer = useRef(null);
  const [investimentos, setInvestimentos] = useState([]);
  const [investLoading, setInvestLoading] = useState(true);
  const investSaveTimer = useRef(null);
  const [meta, setMeta] = useState(0);
  const [metaLoading, setMetaLoading] = useState(true);
  const metaSaveTimer = useRef(null);
  const [patrimonio, setPatrimonio] = useState(0);
  const [patrimonioLoading, setPatrimonioLoading] = useState(true);
  const [pickerOpen, setPickerOpen] = useState(false);
  const isAdmin = user.email === ADMIN_EMAIL;

  useEffect(() => { ensureProfile(user.uid, user.email); }, [user.uid, user.email]);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    (async () => {
      const stored = await loadMonth(user.uid, mKey);
      if (stored) {
        if (!cancelled) { setData({ ...emptyMonthData(), ...stored }); setLoading(false); }
        return;
      }
      // New month: carry the salary forward from the previous month, since it rarely changes.
      const prev = await loadMonth(user.uid, shiftMonth(mKey, -1));
      if (!cancelled) { setData({ ...emptyMonthData(), salario: prev ? prev.salario || 0 : 0 }); setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [user.uid, mKey]);

  useEffect(() => {
    if (loading) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { saveMonth(user.uid, mKey, data); }, 500);
    return () => clearTimeout(saveTimer.current);
  }, [data, loading, user.uid, mKey]);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const list = await loadInvestimentos(user.uid);
      if (!cancelled) { setInvestimentos(list); setInvestLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [user.uid]);

  useEffect(() => {
    if (investLoading) return;
    clearTimeout(investSaveTimer.current);
    investSaveTimer.current = setTimeout(() => { saveInvestimentos(user.uid, investimentos); }, 500);
    return () => clearTimeout(investSaveTimer.current);
  }, [investimentos, investLoading, user.uid]);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const valor = await loadMeta(user.uid);
      if (!cancelled) { setMeta(valor); setMetaLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [user.uid]);

  useEffect(() => {
    if (metaLoading) return;
    clearTimeout(metaSaveTimer.current);
    metaSaveTimer.current = setTimeout(() => { saveMeta(user.uid, meta); }, 500);
    return () => clearTimeout(metaSaveTimer.current);
  }, [meta, metaLoading, user.uid]);

  useEffect(() => {
    let cancelled = false;
    setPatrimonioLoading(true);
    (async () => {
      const months = await loadAllMonths(user.uid);
      let total = 0;
      months.forEach((val) => { total += receitaTotal(val) - despesasTotal(val); });
      if (!cancelled) { setPatrimonio(total); setPatrimonioLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [user.uid, mKey, data]);

  const setDataSafe = useCallback((updater) => setData((prev) => (typeof updater === "function" ? updater(prev) : updater)), []);
  const setInvestimentosSafe = useCallback((updater) => setInvestimentos((prev) => (typeof updater === "function" ? updater(prev) : updater)), []);
  const totalInvestido = investimentos.reduce((s, a) => s + a.valor, 0);
  const totalGuardado = patrimonio + totalInvestido;

  const TABS = [
    ["orcamento", "Orçamento", I.List],
    ["investimentos", "Investimentos", I.Piggy],
    ["meta", "Meta", I.Target],
    ["visaogeral", "Visão geral", I.Trend],
    ...(isAdmin ? [["usuarios", "Usuários", I.Users]] : []),
  ];

  return (
    <div className="min-h-screen w-full" style={{ background: BG }}>
      <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6">
        <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
          <div className="min-w-0">
            <p className="text-xs truncate" style={{ color: "var(--muted-1)" }}>Olá, {user.email}</p>
            <h1 className="text-xl font-serif-app" style={{ color: INK }}>{PAGE_TITLES[page]}</h1>
          </div>
          <div className="flex items-center gap-2">
            {page !== "investimentos" && page !== "meta" && page !== "usuarios" && (
              <div className="relative">
                <div className="flex items-center gap-1 rounded-lg border px-2 py-1.5" style={{ borderColor: LINE, background: SURFACE }}>
                  <button onClick={() => setMKey((k) => shiftMonth(k, -1))}><I.ChevLeft className="w-4 h-4" style={{ color: "var(--muted-1)" }} /></button>
                  <button onClick={() => setPickerOpen((o) => !o)} className="flex items-center gap-1 px-1">
                    <I.Calendar className="w-3.5 h-3.5" style={{ color: "var(--muted-2)" }} />
                    <span className="text-xs font-medium w-24 sm:w-28 text-center whitespace-nowrap" style={{ color: INK }}>{monthLabel(mKey)}</span>
                  </button>
                  <button onClick={() => setMKey((k) => shiftMonth(k, 1))}><I.ChevRight className="w-4 h-4" style={{ color: "var(--muted-1)" }} /></button>
                </div>
                {pickerOpen && (
                  <MonthPicker value={mKey} onChange={setMKey} onClose={() => setPickerOpen(false)} />
                )}
              </div>
            )}
            <ThemeToggle theme={theme} onToggle={onToggleTheme} />
            <button onClick={() => fb().signOut(fb().auth)} className="p-2 rounded-lg border shrink-0" style={{ borderColor: LINE, background: SURFACE }}><I.Logout className="w-4 h-4" style={{ color: "var(--muted-1)" }} /></button>
          </div>
        </div>
        <div className="rounded-xl p-4 mb-6 flex items-center justify-between" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
          <div className="flex items-center gap-2">
            <I.Piggy className="w-4 h-4" style={{ color: NAVY }} />
            <span className="text-[11px] sm:text-xs uppercase tracking-wide font-medium" style={{ color: "var(--muted-1)" }}>Total guardado</span>
          </div>
          {patrimonioLoading ? <I.Spinner className="w-4 h-4 animate-spin" style={{ color: GREEN }} /> : <LedgerNumber value={totalGuardado} className="text-lg font-semibold" color={GREEN} />}
        </div>
        <div className="flex gap-1 mb-6 rounded-lg p-1 w-fit max-w-full overflow-x-auto" style={{ background: "var(--tab-bg)" }}>
          {TABS.map(([k, label, IconComp]) => (
            <button key={k} onClick={() => setPage(k)} className="flex items-center gap-1.5 px-2.5 sm:px-3 py-1.5 text-xs sm:text-sm rounded-md font-medium transition whitespace-nowrap"
              style={page === k ? { background: SURFACE, color: INK, boxShadow: "0 1px 2px rgba(0,0,0,0.08)" } : { color: "var(--muted-5)" }}>
              <IconComp className="w-3.5 h-3.5" />{label}
            </button>
          ))}
        </div>
        {page === "orcamento" && (loading ? <div className="flex justify-center py-20"><I.Spinner className="w-6 h-6 animate-spin" style={{ color: GREEN }} /></div> : <OrcamentoPage data={data} setData={setDataSafe} />)}
        {page === "investimentos" && (investLoading ? <div className="flex justify-center py-20"><I.Spinner className="w-6 h-6 animate-spin" style={{ color: GREEN }} /></div> : <InvestimentosPage investimentos={investimentos} setInvestimentos={setInvestimentosSafe} />)}
        {page === "meta" && (metaLoading ? <div className="flex justify-center py-20"><I.Spinner className="w-6 h-6 animate-spin" style={{ color: GREEN }} /></div> : <MetaPage valor={meta} onSave={setMeta} totalGuardado={totalGuardado} />)}
        {page === "visaogeral" && (loading ? <div className="flex justify-center py-20"><I.Spinner className="w-6 h-6 animate-spin" style={{ color: GREEN }} /></div> : <VisaoGeralPage currentData={data} totalInvestido={totalInvestido} patrimonio={patrimonio} patrimonioLoading={patrimonioLoading} />)}
        {page === "usuarios" && isAdmin && <UsuariosPage />}
      </div>
    </div>
  );
}

function App() {
  const [ready, setReady] = useState(!!window.__firebase);
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [theme, setTheme] = useState(getStoredTheme);

  useEffect(() => { applyTheme(theme); }, [theme]);
  const toggleTheme = useCallback(() => setTheme((t) => (t === "dark" ? "light" : "dark")), []);

  useEffect(() => {
    if (window.__firebase) { setReady(true); return; }
    const handler = () => setReady(true);
    window.addEventListener("firebase-ready", handler, { once: true });
    return () => window.removeEventListener("firebase-ready", handler);
  }, []);

  useEffect(() => {
    if (!ready) return;
    const f = fb();
    const unsub = f.onAuthStateChanged(f.auth, (u) => { setUser(u); setChecking(false); });
    return unsub;
  }, [ready]);

  if (!ready || checking) {
    return <div className="min-h-screen w-full flex items-center justify-center" style={{ background: BG }}><I.Spinner className="w-6 h-6 animate-spin" style={{ color: GREEN }} /></div>;
  }
  return user ? <MainApp user={user} theme={theme} onToggleTheme={toggleTheme} /> : <AuthScreen theme={theme} onToggleTheme={toggleTheme} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
