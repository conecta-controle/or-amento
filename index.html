<script type="text/babel" data-presets="react">

const BG = "#EDF1EA";

const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DEFAULT_CATEGORIES = ["Moradia","Contas","Carro","Saúde","Exercício","Viagens","Reserva de Emergência"];

function fmtBRL(v) {
  const n = Number(v) || 0;
  return n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}
function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; }
function monthLabel(key) {
  const [y, m] = key.split("-").map(Number);
  return `${MESES[m - 1]} de ${y}`;
}
function shiftMonth(key, delta) {
  const [y, m] = key.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return monthKey(d);
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function emptyMonthData() {
  return { receita: 0, investPercent: 0, investValor: 0, fixas: [], variaveis: [], categorias: [...DEFAULT_CATEGORIES] };
}

/* ---------------------------------------------------------------
   Firestore helpers
----------------------------------------------------------------*/
function fb() { return window.__firebase; }
async function loadMonth(uidStr, key) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", key);
  const snap = await f.getDoc(ref);
  return snap.exists() ? snap.data() : null;
}
async function saveMonth(uidStr, key, data) {
  const f = fb();
  const ref = f.doc(f.db, "users", uidStr, "months", key);
  await f.setDoc(ref, data, { merge: false });
}
async function loadAllMonths(uidStr) {
  const f = fb();
  const colRef = f.collection(f.db, "users", uidStr, "months");
  const snap = await f.getDocs(colRef);
  const out = [];
  snap.forEach((d) => out.push(d.data()));
  return out;
}

/* ---------------------------------------------------------------
   Small UI atoms
----------------------------------------------------------------*/
function LedgerNumber({ value, className = "", color }) {

function IconField({ icon: IconComp, ...props }) {

/* ---------------------------------------------------------------
   Auth screen
----------------------------------------------------------------*/
function AuthScreen() {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError("");
    if (!email.trim() || !password) { setError("Preencha e-mail e senha."); return; }
    setBusy(true);
    const f = fb();
    try {
      if (mode === "register") {
        await f.createUserWithEmailAndPassword(f.auth, email.trim(), password);
      } else {
        await f.signInWithEmailAndPassword(f.auth, email.trim(), password);
      }
    } catch (err) {
      const map = {
        "auth/email-already-in-use": "Esse e-mail já está cadastrado. Tente entrar.",
        "auth/invalid-email": "E-mail inválido.",
        "auth/weak-password": "A senha precisa ter pelo menos 6 caracteres.",
        "auth/user-not-found": "Usuário não encontrado. Cadastre-se.",
        "auth/wrong-password": "Senha incorreta.",
        "auth/invalid-credential": "E-mail ou senha incorretos.",
      };
      setError(map[err.code] || "Não foi possível continuar. Tente novamente.");
    }
    setBusy(false);
  }

  return (
    <div className="min-h-screen w-full flex items-center justify-center px-4" style={{ background: BG }}>
      <div className="w-full max-w-sm">
        <div className="flex flex-col items-center mb-6">
          <div className="w-12 h-12 rounded-xl flex items-center justify-center mb-3" style={{ background: GREEN }}>
            <I.Landmark className="w-6 h-6 text-white" />
          </div>
          <h1 className="text-2xl font-serif-app" style={{ color: INK }}>Meu Orçamento</h1>
          <p className="text-sm mt-1" style={{ color: "#5C6A5F" }}>Cada pessoa tem sua própria planilha</p>
        </div>
        <div className="rounded-2xl p-6" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
          <div className="flex mb-5 rounded-lg p-1" style={{ background: BG }}>
            {["login", "register"].map((m) => (
              <button key={m} onClick={() => { setMode(m); setError(""); }}
                className="flex-1 py-2 text-sm rounded-md font-medium transition"
                style={mode === m ? { background: SURFACE, color: INK, boxShadow: "0 1px 2px rgba(0,0,0,0.06)" } : { color: "#7C8A7C" }}>
                {m === "login" ? "Entrar" : "Cadastrar"}
              </button>
            ))}
          </div>
          <form onSubmit={submit} className="space-y-3">
            <IconField icon={I.User} placeholder="E-mail" type="email" value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="username" />
            <div className="relative">
              <IconField icon={I.Lock} placeholder="Senha" type={showPw ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} autoComplete={mode === "login" ? "current-password" : "new-password"} />
              <button type="button" onClick={() => setShowPw((s) => !s)} className="absolute right-3 top-1/2 -translate-y-1/2" style={{ color: "#8A9587" }}>
                {showPw ? <I.EyeOff className="w-4 h-4" /> : <I.Eye className="w-4 h-4" />}
              </button>
            </div>
            {error && <p className="text-xs" style={{ color: BRICK }}>{error}</p>}
            <button type="submit" disabled={busy}
              className="w-full py-2.5 rounded-lg text-sm font-medium text-white flex items-center justify-center gap-2 transition disabled:opacity-60" style={{ background: GREEN }}>
              {busy && <I.Spinner className="w-4 h-4 animate-spin" />}
              {mode === "login" ? "Entrar" : "Criar minha conta"}
            </button>
          </form>
        </div>
        <p className="text-[11px] text-center mt-4" style={{ color: "#8A9587" }}>Seus dados ficam salvos com segurança, vinculados ao seu login.</p>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   Donut chart (pure SVG, no external chart library)
----------------------------------------------------------------*/
function Donut({ items }) {
  const data = items.filter((i) => i.value > 0);
  const total = data.reduce((s, i) => s + i.value, 0);
  if (data.length === 0) {
    return <div className="h-52 flex items-center justify-center text-sm" style={{ color: "#9CA89C" }}>Sem lançamentos ainda</div>;
  }
  const R = 70, C = 2 * Math.PI * R;
  let offset = 0;
  return (
    <div className="h-52 flex items-center justify-center">
      <svg viewBox="0 0 180 180" className="w-44 h-44 -rotate-90">
        <circle cx="90" cy="90" r={R} fill="none" stroke={BG} strokeWidth="24" />
        {data.map((d, i) => {
          const frac = d.value / total;
          const dash = frac * C;
          const el = (
            <circle key={i} cx="90" cy="90" r={R} fill="none" stroke={d.color} strokeWidth="24"
              strokeDasharray={`${dash} ${C - dash}`} strokeDashoffset={-offset} />
          );
          offset += dash;
          return el;
        })}
      </svg>
    </div>
  );
}
function Legend({ items }) {
  const total = items.reduce((s, i) => s + i.value, 0) || 1;
  return (
    <div className="flex flex-wrap gap-x-4 gap-y-1.5 mt-2">
      {items.filter((i) => i.value > 0).map((i, idx) => (
        <div key={idx} className="flex items-center gap-1.5 text-xs" style={{ color: "#5C6A5F" }}>
          <span className="w-2 h-2 rounded-full" style={{ background: i.color }} />
          <span>{Math.round((i.value / total) * 100)}% {i.name}</span>
        </div>
      ))}
    </div>
  );
}

/* ---------------------------------------------------------------
   Modals
----------------------------------------------------------------*/
function ExpenseModal({ kind, initial, categorias, onSave, onClose, onAddCategoria }) {
  const [nome, setNome] = useState(initial?.nome || "");
  const [valor, setValor] = useState(initial?.valor ?? "");
  const [data, setData] = useState(initial?.data || new Date().toISOString().slice(0, 10));
  const [categoria, setCategoria] = useState(initial?.categoria || "");
  const [novaCategoria, setNovaCategoria] = useState("");
  const [addingCat, setAddingCat] = useState(false);

  function submit(e) {
    e.preventDefault();
    if (!nome.trim() || !valor) return;
    onSave({ id: initial?.id || uid(), nome: nome.trim(), valor: Number(valor), data, ...(kind === "variavel" ? { categoria: categoria || "Outros" } : {}) });
  }
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{ background: "rgba(28,43,36,0.35)" }} onClick={onClose}>
      <div className="w-full max-w-sm rounded-2xl p-5" style={{ background: SURFACE }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-serif-app text-lg" style={{ color: INK }}>{initial ? "Editar" : "Nova"} despesa {kind === "fixa" ? "fixa" : "variável"}</h3>
          <button onClick={onClose}><I.X className="w-4 h-4" style={{ color: "#8A9587" }} /></button>
        </div>
        <form onSubmit={submit} className="space-y-3">
          <div>
            <label className="text-xs font-medium" style={{ color: "#7C8A7C" }}>Data</label>
            <input type="date" value={data} onChange={(e) => setData(e.target.value)} className="w-full mt-1 rounded-lg border px-3 py-2 text-sm outline-none" style={{ borderColor: LINE }} />
          </div>
          <div>
            <label className="text-xs font-medium" style={{ color: "#7C8A7C" }}>Nome</label>
            <input value={nome} onChange={(e) => setNome(e.target.value)} placeholder="Ex: Aluguel" className="w-full mt-1 rounded-lg border px-3 py-2 text-sm outline-none" style={{ borderColor: LINE }} />
          </div>
          <div>
            <label className="text-xs font-medium" style={{ color: "#7C8A7C" }}>Valor (R$)</label>
            <input type="number" step="0.01" min="0" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0,00" className="w-full mt-1 rounded-lg border px-3 py-2 text-sm outline-none font-mono-app" style={{ borderColor: LINE }} />
          </div>
          {kind === "variavel" && (
            <div>
              <label className="text-xs font-medium" style={{ color: "#7C8A7C" }}>Categoria</label>
              {!addingCat ? (
                <select value={categoria} onChange={(e) => { if (e.target.value === "__new__") { setAddingCat(true); return; } setCategoria(e.target.value); }}
                  className="w-full mt-1 rounded-lg border px-3 py-2 text-sm outline-none bg-white" style={{ borderColor: LINE }}>
                  <option value="">Selecione…</option>
                  {categorias.map((c) => <option key={c} value={c}>{c}</option>)}
                  <option value="__new__">+ Nova categoria</option>
                </select>
              ) : (
                <div className="flex gap-2 mt-1">
                  <input value={novaCategoria} onChange={(e) => setNovaCategoria(e.target.value)} placeholder="Nome da categoria" className="flex-1 rounded-lg border px-3 py-2 text-sm outline-none" style={{ borderColor: LINE }} />
                  <button type="button" onClick={() => { if (novaCategoria.trim()) { onAddCategoria(novaCategoria.trim()); setCategoria(novaCategoria.trim()); setNovaCategoria(""); setAddingCat(false); } }} className="px-3 rounded-lg text-sm text-white" style={{ background: GREEN }}>OK</button>
                </div>
              )}
            </div>
          )}
          <button type="submit" className="w-full py-2.5 rounded-lg text-sm font-medium text-white mt-1" style={{ background: GREEN }}>Salvar</button>
        </form>
      </div>
    </div>
  );
}
function InvestModal({ receita, initialPercent, initialValor, onSave, onClose }) {
  const [percent, setPercent] = useState(initialPercent || 0);
  const [valor, setValor] = useState(initialValor || 0);
  function setByPercent(p) { setPercent(p); setValor(Math.round((receita * p) / 100)); }
  function setByValor(v) { setValor(v); setPercent(receita > 0 ? Math.round((v / receita) * 100) : 0); }
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{ background: "rgba(28,43,36,0.35)" }} onClick={onClose}>
      <div className="w-full max-w-sm rounded-2xl p-5" style={{ background: SURFACE }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-1">
          <h3 className="font-serif-app text-lg" style={{ color: INK }}>Investir</h3>
          <button onClick={onClose}><I.X className="w-4 h-4" style={{ color: "#8A9587" }} /></button>
        </div>
        <p className="text-xs mb-4" style={{ color: "#7C8A7C" }}>Quanto da sua receita você reserva pra investir.</p>
        <div className="text-center mb-3"><span className="text-4xl font-serif-app" style={{ color: NAVY }}>{percent}%</span></div>
        <input type="range" min="0" max="100" value={percent} onChange={(e) => setByPercent(Number(e.target.value))} className="w-full mb-3" style={{ accentColor: NAVY }} />
        <div className="flex gap-2 mb-4">
          {[20, 30, 40, 50].map((p) => (
            <button key={p} onClick={() => setByPercent(p)} className="flex-1 py-1.5 rounded-lg text-sm border"
              style={percent === p ? { background: NAVY, color: "#fff", borderColor: NAVY } : { borderColor: LINE, color: "#5C6A5F" }}>{p}%</button>
          ))}
        </div>
        <p className="text-center text-xs mb-1" style={{ color: "#7C8A7C" }}>Valor a investir</p>
        <input type="number" value={valor} onChange={(e) => setByValor(Number(e.target.value))} className="w-full text-center text-2xl font-mono-app rounded-lg border py-2 mb-1 outline-none" style={{ borderColor: LINE, color: NAVY }} />
        <p className="text-center text-[11px] mb-4" style={{ color: "#9CA89C" }}>Toque no valor pra digitar. O percentual se ajusta sozinho.</p>
        <div className="flex gap-2">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-lg text-sm border" style={{ borderColor: LINE, color: "#5C6A5F" }}>Cancelar</button>
          <button onClick={() => onSave(percent, valor)} className="flex-1 py-2.5 rounded-lg text-sm font-medium text-white" style={{ background: GREEN }}>Salvar</button>
        </div>
      </div>
    </div>
  );
}
function ReceitaModal({ initial, onSave, onClose }) {
  const [valor, setValor] = useState(initial || 0);
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{ background: "rgba(28,43,36,0.35)" }} onClick={onClose}>
      <div className="w-full max-w-xs rounded-2xl p-5" style={{ background: SURFACE }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-serif-app text-lg" style={{ color: INK }}>Receita do mês</h3>
          <button onClick={onClose}><I.X className="w-4 h-4" style={{ color: "#8A9587" }} /></button>
        </div>
        <input type="number" step="0.01" min="0" value={valor} onChange={(e) => setValor(e.target.value)} className="w-full text-center text-2xl font-mono-app rounded-lg border py-2 mb-4 outline-none" style={{ borderColor: LINE, color: GREEN }} />
        <button onClick={() => onSave(Number(valor))} className="w-full py-2.5 rounded-lg text-sm font-medium text-white" style={{ background: GREEN }}>Salvar</button>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   Expense table
----------------------------------------------------------------*/
function ExpenseTable({ rows, kind, onEdit, onDelete }) {
  if (rows.length === 0) return <div className="py-10 text-center text-sm" style={{ color: "#9CA89C" }}>Nenhuma despesa lançada neste mês.</div>;
  const sorted = [...rows].sort((a, b) => (a.data || "").localeCompare(b.data || ""));
  const gridCols = kind === "variavel" ? "70px 1fr 110px 90px 60px" : "70px 1fr 90px 60px";
  return (
    <div>
      <div className="grid text-[11px] uppercase tracking-wide font-medium pb-2 mb-1" style={{ color: "#8A9587", borderBottom: `1px solid ${LINE}`, gridTemplateColumns: gridCols }}>
        <span>Data</span><span>Nome</span>{kind === "variavel" && <span>Categoria</span>}<span className="text-right">Valor</span><span />
      </div>
      {sorted.map((r) => (
        <div key={r.id} className="grid items-center py-2 text-sm" style={{ borderBottom: `1px dashed ${LINE}`, gridTemplateColumns: gridCols }}>
          <span className="text-xs" style={{ color: "#7C8A7C" }}>{r.data ? r.data.slice(8, 10) + "/" + r.data.slice(5, 7) : ""}</span>
          <span style={{ color: INK }}>{r.nome}</span>
          {kind === "variavel" && <span className="text-xs px-2 py-0.5 rounded-full w-fit" style={{ background: BG, color: "#5C6A5F" }}>{r.categoria}</span>}
          <LedgerNumber value={-r.valor} className="text-right text-sm" color={BRICK} />
          <div className="flex justify-end gap-2">
            <button onClick={() => onEdit(r)}><I.Pencil className="w-3.5 h-3.5" style={{ color: "#8A9587" }} /></button>
            <button onClick={() => onDelete(r.id)}><I.Trash className="w-3.5 h-3.5" style={{ color: BRICK }} /></button>
          </div>
        </div>
      ))}
      <div className="flex justify-end pt-3"><LedgerNumber value={-rows.reduce((s, r) => s + r.valor, 0)} className="text-base font-semibold" color={BRICK} /></div>
    </div>
  );
}

/* ---------------------------------------------------------------
   Orçamento page
----------------------------------------------------------------*/
function OrcamentoPage({ data, setData }) {
  const [tab, setTab] = useState("fixa");
  const [modal, setModal] = useState(null);
  const [investOpen, setInvestOpen] = useState(false);
  const [receitaOpen, setReceitaOpen] = useState(false);

  const totalFixas = data.fixas.reduce((s, r) => s + r.valor, 0);
  const totalVariaveis = data.variaveis.reduce((s, r) => s + r.valor, 0);
  const despesas = totalFixas + totalVariaveis;
  const saldo = data.receita - despesas - (data.investValor || 0);

  function saveExpense(kind, item) {
    setData((d) => {
      const list = kind === "fixa" ? "fixas" : "variaveis";
      const arr = d[list];
      const exists = arr.some((r) => r.id === item.id);
      const next = exists ? arr.map((r) => (r.id === item.id ? item : r)) : [...arr, item];
      return { ...d, [list]: next };
    });
    setModal(null);
  }
  function deleteExpense(kind, id) {
    setData((d) => { const list = kind === "fixa" ? "fixas" : "variaveis"; return { ...d, [list]: d[list].filter((r) => r.id !== id) }; });
  }
  function addCategoria(c) { setData((d) => (d.categorias.includes(c) ? d : { ...d, categorias: [...d.categorias, c] })); }

  const fixasDonut = data.fixas.map((r, i) => ({ name: r.nome, value: r.valor, color: PALETTE[i % PALETTE.length] }));
  const variaveisByCat = useMemo(() => {
    const map = {};
    data.variaveis.forEach((r) => { map[r.categoria] = (map[r.categoria] || 0) + r.valor; });
    return Object.entries(map).map(([name, value], i) => ({ name, value, color: PALETTE[i % PALETTE.length] }));
  }, [data.variaveis]);
  const donutItems = tab === "fixa" ? fixasDonut : tab === "variavel" ? variaveisByCat : [];

  return (
    <div>
      <div className="flex flex-wrap gap-3 mb-6">
        <SummaryCard label="Receita" value={data.receita} icon={I.Wallet} color={GREEN} action={<button onClick={() => setReceitaOpen(true)}><I.Pencil className="w-3 h-3" style={{ color: "#8A9587" }} /></button>} />
        <SummaryCard label="Investir" value={data.investValor || 0} icon={I.Piggy} color={NAVY} action={<button onClick={() => setInvestOpen(true)} className="text-[10px] font-medium px-2 py-0.5 rounded-full text-white" style={{ background: NAVY }}>Ajustar</button>} />
        <SummaryCard label="Despesas" value={despesas} icon={I.Receipt} color={BRICK} />
        <SummaryCard label="Saldo" value={saldo} icon={I.Grid} color={saldo < 0 ? BRICK : INK} />
      </div>
      <div className="grid lg:grid-cols-[1fr_320px] gap-5">
        <div className="rounded-xl p-5" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
          <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
            <div className="flex rounded-lg p-1" style={{ background: BG }}>
              {[["receita", "Receita"], ["fixa", "Despesa fixa"], ["variavel", "Despesa variável"]].map(([k, label]) => (
                <button key={k} onClick={() => setTab(k)} className="px-3 py-1.5 text-xs sm:text-sm rounded-md font-medium transition"
                  style={tab === k ? { background: SURFACE, color: INK, boxShadow: "0 1px 2px rgba(0,0,0,0.06)" } : { color: "#7C8A7C" }}>{label}</button>
              ))}
            </div>
            {tab !== "receita" && <button onClick={() => setModal({ kind: tab })} className="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg text-white" style={{ background: GREEN }}><I.Plus className="w-3.5 h-3.5" /> Adicionar</button>}
          </div>
          {tab === "receita" && (
            <div className="py-6 text-center">
              <p className="text-xs mb-2" style={{ color: "#7C8A7C" }}>Receita cadastrada para este mês</p>
              <LedgerNumber value={data.receita} className="text-3xl font-semibold" color={GREEN} />
              <div className="mt-4"><button onClick={() => setReceitaOpen(true)} className="text-xs font-medium px-3 py-1.5 rounded-lg" style={{ background: BG, color: INK }}>Editar receita</button></div>
            </div>
          )}
          {tab === "fixa" && <ExpenseTable rows={data.fixas} kind="fixa" onEdit={(r) => setModal({ kind: "fixa", initial: r })} onDelete={(id) => deleteExpense("fixa", id)} />}
          {tab === "variavel" && <ExpenseTable rows={data.variaveis} kind="variavel" onEdit={(r) => setModal({ kind: "variavel", initial: r })} onDelete={(id) => deleteExpense("variavel", id)} />}
        </div>
        <div className="rounded-xl p-5" style={{ background: SURFACE, border: `1px solid ${LINE}` }}>
          <p className="text-xs font-medium uppercase tracking-wide mb-1" style={{ color: "#8A9587" }}>{tab === "fixa" ? "Despesas fixas" : tab === "variavel" ? "Despesas variáveis" : "Distribuição"}</p>
          {tab === "receita" ? (
            <div className="h-52 flex items-center justify-center text-sm text-center px-4" style={{ color: "#9CA89C" }}>Cadastre despesas para ver a distribuição aqui.</div>
          ) : (<><Donut items={donutItems} /><Legend items={donutItems} /></>)}
        </div>
      </div>
      {modal && <ExpenseModal kind={modal.kind} initial={modal.initial} categorias={data.categorias} onSave={(item) => saveExpense(modal.kind, item)} onClose={() => setModal(null)} onAddCategoria={addCategoria} />}
      {investOpen && <InvestModal receita={data.receita} initialPercent={data.investPercent} initialValor={data.investValor} onSave={(percent, valor) => { setData((d) => ({ ...d, investPercent: percent, investValor: valor })); setInvestOpen(false); }} onClose={() => setInvestOpen(false)} />}
      {receitaOpen && <ReceitaModal initial={data.receita} onSave={(v) => { setData((d) => ({ ...d, receita: v })); setReceitaOpen(false); }} onClose={() => setReceitaOpen(false)} />}
    </div>
  );
}

/* ---------------------------------------------------------------
   Visão geral page
----------------------------------------------------------------*/
function VisaoGeralPage({ uidStr, currentData, monthKeyStr }) {
  const [totals, setTotals] = useState({ patrimonio: 0, investido: 0, loading: true });
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const months = await loadAllMonths(uidStr);
      let patrimonio = 0, investido = 0;
      months.forEach((val) => {
        const despesas = (val.fixas || []).reduce((s, r) => s + r.valor, 0) + (val.variaveis || []).reduce((s, r) => s + r.valor, 0);
        const saldo = (val.receita || 0) - despesas - (val.investValor || 0);
        patrimonio += saldo + (val.investValor || 0);
        investido += (val.investValor || 0);
      });
      if (!cancelled) setTotals({ patrimonio, investido, loading: false });
    })();
    return () => { cancelled = true; };
  }, [uidStr, monthKeyStr, currentData]);

  const despesasMes = currentData.fixas.reduce((s, r) => s + r.valor, 0) + currentData.variaveis.reduce((s, r) => s + r.valor, 0);
  const metaPct = currentData.receita > 0 ? Math.min(100, Math.round((despesasMes / currentData.receita) * 100)) : 0;
  const cards = [
    { label: "Patrimônio total", value: totals.patrimonio, bg: GREEN, hint: "Saldo + investido acumulados" },
    { label: "Total investido", value: totals.investido, bg: NAVY, hint: totals.investido > 0 ? "Seu dinheiro trabalhando" : "Comece a investir. Faça seu dinheiro render." },
    { label: "Despesas do mês", value: despesasMes, bg: BRICK, hint: `${metaPct}% da receita`, progress: metaPct },
  ];
  return (
    <div className="grid sm:grid-cols-3 gap-4">
      {cards.map((c, i) => (
        <div key={i} className="rounded-xl p-5 text-white relative overflow-hidden" style={{ background: c.bg, minHeight: 140 }}>
          <p className="text-[11px] uppercase tracking-wide opacity-80 mb-3">{c.label}</p>
          {totals.loading && i < 2 ? <I.Spinner className="w-5 h-5 animate-spin opacity-80" /> : <LedgerNumber value={c.value} className="text-2xl font-semibold" />}
          <p className="text-xs opacity-75 mt-2">{c.hint}</p>
          {typeof c.progress === "number" && <div className="absolute bottom-0 left-0 h-1 bg-white/90" style={{ width: `${c.progress}%` }} />}
        </div>
      ))}
    </div>
  );
}

/* ---------------------------------------------------------------
   App shell
----------------------------------------------------------------*/
function MainApp({ user }) {
  const [page, setPage] = useState("orcamento");
  const [mKey, setMKey] = useState(monthKey(new Date()));
  const [data, setData] = useState(emptyMonthData());
  const [loading, setLoading] = useState(true);
  const saveTimer = useRef(null);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    (async () => {
      const stored = await loadMonth(user.uid, mKey);
      if (!cancelled) { setData(stored ? { ...emptyMonthData(), ...stored } : emptyMonthData()); setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [user.uid, mKey]);

  useEffect(() => {
    if (loading) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { saveMonth(user.uid, mKey, data); }, 500);
    return () => clearTimeout(saveTimer.current);
  }, [data, loading, user.uid, mKey]);

  const setDataSafe = useCallback((updater) => setData((prev) => (typeof updater === "function" ? updater(prev) : updater)), []);

  return (
    <div className="min-h-screen w-full" style={{ background: BG }}>
      <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6">
        <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
          <div>
            <p className="text-xs" style={{ color: "#7C8A7C" }}>Olá, {user.email}</p>
            <h1 className="text-xl font-serif-app" style={{ color: INK }}>{page === "orcamento" ? "Orçamento" : "Visão geral"}</h1>
          </div>
          <div className="flex items-center gap-2">
            <div className="flex items-center gap-1 rounded-lg border px-2 py-1.5" style={{ borderColor: LINE, background: SURFACE }}>
              <button onClick={() => setMKey((k) => shiftMonth(k, -1))}><I.ChevLeft className="w-4 h-4" style={{ color: "#7C8A7C" }} /></button>
              <span className="text-xs font-medium px-1 w-28 text-center" style={{ color: INK }}>{monthLabel(mKey)}</span>
              <button onClick={() => setMKey((k) => shiftMonth(k, 1))}><I.ChevRight className="w-4 h-4" style={{ color: "#7C8A7C" }} /></button>
            </div>
            <button onClick={() => fb().signOut(fb().auth)} className="p-2 rounded-lg border" style={{ borderColor: LINE, background: SURFACE }}><I.Logout className="w-4 h-4" style={{ color: "#7C8A7C" }} /></button>
          </div>
        </div>
        <div className="flex gap-1 mb-6 rounded-lg p-1 w-fit" style={{ background: "#E2E9DE" }}>
          {[["orcamento", "Orçamento", I.List], ["visaogeral", "Visão geral", I.Trend]].map(([k, label, IconComp]) => (
            <button key={k} onClick={() => setPage(k)} className="flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-md font-medium transition"
              style={page === k ? { background: SURFACE, color: INK, boxShadow: "0 1px 2px rgba(0,0,0,0.08)" } : { color: "#6B7A67" }}>
              <IconComp className="w-3.5 h-3.5" />{label}
            </button>
          ))}
        </div>
        {loading ? <div className="flex justify-center py-20"><I.Spinner className="w-6 h-6 animate-spin" style={{ color: GREEN }} /></div>
          : page === "orcamento" ? <OrcamentoPage data={data} setData={setDataSafe} /> : <VisaoGeralPage uidStr={user.uid} currentData={data} monthKeyStr={mKey} />}
      </div>
    </div>
  );
}

function App() {
  const [ready, setReady] = useState(!!window.__firebase);
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    if (window.__firebase) { setReady(true); return; }
    const handler = () => setReady(true);
    window.addEventListener("firebase-ready", handler, { once: true });
    return () => window.removeEventListener("firebase-ready", handler);
  }, []);

  useEffect(() => {
    if (!ready) return;
    const f = fb();
    const unsub = f.onAuthStateChanged(f.auth, (u) => { setUser(u); setChecking(false); });
    return unsub;
  }, [ready]);

  if (!ready || checking) {
    return <div className="min-h-screen w-full flex items-center justify-center" style={{ background: BG }}><I.Spinner className="w-6 h-6 animate-spin" style={{ color: GREEN }} /></div>;
  }
  return user ? <MainApp user={user} /> : <AuthScreen />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
